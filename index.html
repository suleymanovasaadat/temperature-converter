<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <title>Конвертер температуры</title>

    <!-- 🔗 ПОДКЛЮЧАЕМ СТИЛИ (CSS) -->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <h2>Градусы в Фаренгейты</h2>
      <input type="number" id="celsiusInput" placeholder="Введите °C" />
      <button id="convertBtn">Конвертировать</button>
      <p id="result">Результат:</p>
    </div>

    <!-- 🔗 ПОДКЛЮЧАЕМ СКРИПТЫ (JS) -->
    <!-- Мы используем атрибут defer, чтобы скрипт загружался на фоне и выполнялся только после того, как весь HTML на странице полностью построится -->
    <script src="js/script.js" defer></script>
  </body>
</html>
